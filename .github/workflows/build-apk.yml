name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-dev python3-setuptools python3-venv
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config
        sudo apt install -y zlib1g-dev libncursesw5-dev cmake
        sudo apt install -y libffi-dev libssl-dev
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Debug Android SDK structure
      run: |
        echo "=== 检查 /usr/local/lib/android/sdk ==="
        if [ -d "/usr/local/lib/android/sdk" ]; then
          echo "SDK 目录存在"
          echo ""
          echo "cmdline-tools:"
          find /usr/local/lib/android/sdk -name "cmdline-tools" -type d | head -5
          echo ""
          echo "tools:"
          ls -la /usr/local/lib/android/sdk/tools/ 2>/dev/null || echo "  tools 不存在"
          echo ""
          echo "sdkmanager 位置:"
          find /usr/local/lib/android/sdk -name "sdkmanager" -type f | head -5
        else
          echo "SDK 目录不存在"
        fi
        
        echo ""
        echo "=== 检查 ANDROID_HOME 环境变量 ==="
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
    
    - name: Setup Android SDK
      run: |
        # 检测预装 SDK
        PREINSTALLED_SDK=""
        if [ -d "/usr/local/lib/android/sdk" ]; then
          PREINSTALLED_SDK="/usr/local/lib/android/sdk"
        fi
        
        # 创建 buildozer 期望的目录结构
        BUILDOZER_SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $BUILDOZER_SDK
        
        if [ -n "$PREINSTALLED_SDK" ]; then
          echo "使用预装 SDK: $PREINSTALLED_SDK"
          
          # 复制整个 SDK
          cp -r $PREINSTALLED_SDK/* $BUILDOZER_SDK/ 2>/dev/null || true
          
          # 检查是否有 tools/bin/sdkmanager
          if [ ! -f $BUILDOZER_SDK/tools/bin/sdkmanager ]; then
            echo "tools/bin/sdkmanager 不存在，创建它..."
            
            # 查找 sdkmanager
            SDKMANAGER=$(find $BUILDOZER_SDK -name "sdkmanager" -type f | head -1)
            if [ -n "$SDKMANAGER" ]; then
              echo "找到 sdkmanager: $SDKMANAGER"
              mkdir -p $BUILDOZER_SDK/tools/bin
              cp $SDKMANAGER $BUILDOZER_SDK/tools/bin/
            fi
          fi
        fi
        
        # 验证
        echo ""
        echo "=== SDK 结构验证 ==="
        ls -la $BUILDOZER_SDK/tools/bin/ 2>/dev/null || echo "tools/bin 不存在"
        find $BUILDOZER_SDK -name "sdkmanager" -type f | head -3
        
        # 设置环境变量
        echo "ANDROID_HOME=$BUILDOZER_SDK" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$BUILDOZER_SDK" >> $GITHUB_ENV
    
    - name: Build APK
      run: |
        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 90
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7