name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-dev python3-setuptools python3-venv
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config
        sudo apt install -y zlib1g-dev libncursesw5-dev cmake
        sudo apt install -y libffi-dev libssl-dev
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Setup Android SDK
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT
        cd $SDK_ROOT
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mkdir -p cmdline-tools
        mv cmdline-tools cmdline-tools-temp 2>/dev/null || true
        mkdir -p cmdline-tools/latest
        mv cmdline-tools-temp/* cmdline-tools/latest/ 2>/dev/null || mv * cmdline-tools/latest/ 2>/dev/null || true
        rmdir cmdline-tools-temp 2>/dev/null || true
        echo "export ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
        echo "export PATH=$SDK_ROOT/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV
        yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
    
    - name: Build APK
      run: |
        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 90
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7