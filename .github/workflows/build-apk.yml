name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build APK using Docker
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/home/user/script-generator \
          -w /home/user/script-generator \
          -i \
          kivy/buildozer:latest \
          bash -c '
            set -e
            echo "=== Python 版本 ==="
            python3 --version
            echo ""
            echo "=== 构建 APK ==="
            yes | buildozer --allow-root android debug 2>&1 | tee buildozer.log
          '
      timeout-minutes: 180
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7