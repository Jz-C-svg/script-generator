name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        sudo apt-get install -y zlib1g-dev libncurses-dev cmake
        sudo apt-get install -y libffi-dev libssl-dev git autoconf libtool
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        python3 --version
        pip3 install --upgrade "pip<24.0" setuptools wheel
        pip3 install "cython==0.29.36"
        pip3 install "buildozer==1.5.0"
        pip3 install kivymd==1.1.1 httpx bs4 jinja2
        echo "=== Versions ==="
        python3 --version
        cython --version
        buildozer --version
    
    - name: Build APK
      timeout-minutes: 120
      run: |
        set -e
        cd $GITHUB_WORKSPACE
        export ANDROIDAPI=33
        export ANDROIDMINAPI=21
        yes | buildozer -v android debug 2>&1 | tee buildozer.log
        echo "=== Verify APK ==="
        ls -la bin/*.apk
      env:
        BUILDOZER_ALLOW_ROOT: 1
        BUILDOZER_WARN_ON_ROOT: 0
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: scriptgenerator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7
