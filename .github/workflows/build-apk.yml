name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-dev python3-setuptools python3-venv \
          git zip unzip openjdk-17-jdk libtool pkg-config \
          zlib1g-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev \
          libtool-bin autoconf-archive automake
        
        # 安装 autoconf 2.69 并替换默认版本
        sudo apt-get install -y autoconf2.69 || true
        if [ -f /usr/bin/autoconf2.69 ]; then
          sudo cp /usr/bin/autoconf2.69 /usr/bin/autoconf
          sudo cp /usr/bin/autoheader2.69 /usr/bin/autoheader 2>/dev/null || true
          sudo cp /usr/bin/automake-2.69 /usr/bin/automake 2>/dev/null || true
          echo "=== autoconf 版本 ==="
          autoconf --version | head -1
        else
          echo "autoconf2.69 not found"
          ls /usr/bin/autoconf* 2>/dev/null || true
        fi
        
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Cache Buildozer downloads
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-v4-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-v4-
    
    - name: Build APK
      run: |
        set -e
        set -o pipefail
        
        echo "=== 检查 autoconf ==="
        which autoconf
        autoconf --version | head -1
        autoreconf --version | head -1
        
        echo ""
        echo "=== 开始构建 ==="
        yes | buildozer android debug 2>&1 | tee buildozer.log
        BUILD_RESULT=$PIPESTATUS[0]
        echo "=== Build exit code: $BUILD_RESULT ==="
        if [ $BUILD_RESULT -ne 0 ]; then
          echo "Build failed with exit code $BUILD_RESULT"
          exit 1
        fi
        if [ ! -f bin/*.apk ]; then
          echo "Error: No APK file generated in bin/"
          ls -la bin/ 2>/dev/null || echo "bin/ does not exist"
          exit 1
        fi
        echo "APK successfully generated:"
        ls -la bin/*.apk
      timeout-minutes: 180
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7