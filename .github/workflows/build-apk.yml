name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-dev python3-setuptools python3-venv
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config
        sudo apt install -y zlib1g-dev libncursesw5-dev cmake
        sudo apt install -y libffi-dev libssl-dev
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Setup Android SDK
      run: |
        SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
        
        # 创建目录
        mkdir -p $SDK_DIR/cmdline-tools/latest
        
        # 下载并解压到临时目录
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        
        # 检查解压后的结构
        ls -la /tmp/
        ls -la /tmp/cmdline-tools/ 2>/dev/null || true
        
        # 移动内容到正确位置
        if [ -d /tmp/cmdline-tools ]; then
          if [ -d /tmp/cmdline-tools/bin ]; then
            # 内容直接是 bin/lib 形式
            cp -r /tmp/cmdline-tools/* $SDK_DIR/cmdline-tools/latest/
          else
            # 内容是 cmdline-tools/bin 嵌套形式
            cp -r /tmp/cmdline-tools/* $SDK_DIR/cmdline-tools/latest/
          fi
        fi
        
        # 验证 bin 目录存在
        echo "=== SDK bin contents ==="
        ls -la $SDK_DIR/cmdline-tools/latest/bin/ 2>/dev/null || echo "bin not found"
        
        # 设置环境变量
        echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
        echo "PATH=$SDK_DIR/cmdline-tools/latest/bin:$SDK_DIR/platform-tools:$PATH" >> $GITHUB_ENV
        
        # 接受许可证
        yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        
        # 安装必要的组件
        $SDK_DIR/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        
        # 验证
        ls -la $SDK_DIR/build-tools/ 2>/dev/null || echo "build-tools not installed"
    
    - name: Build APK
      run: |
        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 90
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7