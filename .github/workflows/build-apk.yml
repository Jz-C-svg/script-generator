name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: ubuntu:22.04
      options: --privileged
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install all dependencies
      run: |
        bash -c '
        set -e
        
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y software-properties-common
        
        # 安装 Python 3.11 (宿主 + 用于下载源码)
        add-apt-repository -y ppa:deadsnakes/ppa
        apt-get update
        apt-get install -y \
          python3.11 python3.11-dev python3.11-venv \
          git zip unzip openjdk-17-jdk \
          libtool pkg-config zlib1g-dev \
          libncursesw5-dev cmake \
          libffi-dev libssl-dev \
          libtool-bin autoconf automake \
          gcc g++ make cython3 wget
        
        # 软链接
        ln -sf /usr/bin/python3.11 /usr/bin/python3
        ln -sf /usr/bin/cython3 /usr/bin/cython
        
        # 安装 pip
        curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11
        
        # 下载 Python 3.11 源码（供 buildozer 使用）
        cd /tmp
        wget -q https://www.python.org/ftp/python/3.11.0/Python-3.11.0.tgz
        tar xzf Python-3.11.0.tgz
        mkdir -p /opt/python-3.11-android
        cp -r Python-3.11.0/* /opt/python-3.11-android/
        rm -rf Python-3.11.0 Python-3.11.0.tgz
        
        echo "=== 环境 ==="
        python3 --version
        java -version 2>&1 | head -1
        
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        '
    
    - name: Install Python packages
      run: |
        bash -c '
        set -e
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer
        '
    
    - name: Build APK
      run: |
        bash -c '
        set -e
        
        # 告诉 buildozer 使用 Python 3.11 源码
        export PYTHONPATH=/opt/python-3.11-android
        export PATH=/opt/python-3.11-android:
        
        # 预先下载 Python 3.11 源码供 buildozer 使用
        cd /
        wget -q https://www.python.org/ftp/python/3.11.0/Python-3.11.0.tgz -O Python-3.11.0.tgz
        
        echo "=== 构建 ==="
        python3 --version
        which buildozer
        
        # 构建（不带 lxml！）
        yes | buildozer android debug 2>&1 | tee buildozer.log
        '
      timeout-minutes: 180
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7