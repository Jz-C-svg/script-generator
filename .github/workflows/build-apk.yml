name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: kivy/buildozer:latest
      options: --user root
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Fix pip compatibility
      run: |
        echo "=== Fix pip < 24.0 (resolvelib compatibility) ==="
        pip3 install --upgrade "pip<24.0" setuptools wheel
        pip3 --version
        echo ""
        echo "=== Install Cython 0.29.36 ==="
        pip3 install "cython==0.29.36"
        cython --version
    
    - name: Build APK
      timeout-minutes: 120
      run: |
        set -e
        cd $GITHUB_WORKSPACE
        echo "=== Starting build (pip fixed) ==="
        yes | buildozer -v android debug 2>&1 | tee buildozer.log
        echo "=== Verify APK ==="
        ls -la bin/*.apk
      env:
        ANDROIDAPI: "33"
        ANDROIDMINAPI: "21"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: scriptgenerator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7