name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: kivy/buildozer:latest
      options: --user root
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Verify environment
      run: |
        echo "=== Python ==="
        python3 --version
        echo ""
        echo "=== Cython ==="
        cython --version || echo "Cython not found"
        echo ""
        echo "=== buildozer ==="
        buildozer --version || echo "buildozer not found"
        echo ""
        echo "=== Java ==="
        java -version 2>&1 | head -1
        echo ""
        echo "=== Android SDK ==="
        ls -la $ANDROIDSDK/ 2>/dev/null || echo "ANDROIDSDK not set"
    
    - name: Install Python dependencies
      run: |
        pip3 install --upgrade pip
        pip3 install kivymd==1.1.1 httpx bs4 jinja2
    
    - name: Build APK
      timeout-minutes: 120
      run: |
        set -e
        cd $GITHUB_WORKSPACE
        echo "=== Starting build ==="
        yes | buildozer -v android debug 2>&1 | tee buildozer.log
        echo "=== Verifying APK ==="
        ls -la bin/*.apk
      env:
        ANDROIDAPI: "33"
        ANDROIDMINAPI: "21"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7