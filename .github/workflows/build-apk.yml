name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        sudo apt-get install -y zlib1g-dev libncurses-dev cmake
        sudo apt-get install -y libffi-dev libssl-dev git autoconf automake libtool pkg-config
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Install Python packages
      run: |
        python3 --version
        pip3 install --upgrade pip==23.3.2 setuptools wheel
        pip3 install "cython<3"
        pip3 install buildozer
        pip3 install kivy kivymd httpx beautifulsoup4 jinja2
        pip3 --version
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        PATH: /usr/lib/jvm/java-17-openjdk-amd64/bin:/opt/hostedtoolcache/Python/3.10.20/x64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    - name: Verify fix script
      run: |
        set -x
        echo "PWD=$(pwd)"
        /bin/ls -la fix_pip_final.py || ls -la fix_pip_final.py || echo "file check failed"
        /usr/bin/head -n 5 fix_pip_final.py || head -n 5 fix_pip_final.py || echo "head failed"
        echo "PATH=$PATH"

    - name: Build APK with pip fix
      timeout-minutes: 180
      run: |
        export ANDROIDAPI=27
        export ANDROIDMINAPI=21
        export ANDROIDNDK=25
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        export BUILDOZER_ALLOW_ROOT=1
        export BUILDOZER_WARN_ON_ROOT=0
        
        cd "$GITHUB_WORKSPACE"
        
        # Start pip fix monitor in background
        {
          echo "=== [$(date)] Starting pip fix monitor ==="
          python3 fix_pip_final.py 2>&1
          echo "=== [$(date)] pip fix monitor finished ==="
        } > /tmp/pip_fix_output.log 2>&1 &
        FIX_PID=$!
        echo "Started pip fix monitor (PID: $FIX_PID)"
        echo "Fix output will be in /tmp/pip_fix_output.log"
        
        # Run buildozer
        echo "=== [$(date)] Starting buildozer ==="
        yes | buildozer -v android debug 2>&1 | tee buildozer.log || true
        BUILD_EXIT=$?
        echo "=== [$(date)] buildozer finished (exit: $BUILD_EXIT) ==="
        
        # Show fix output
        echo "=== Fix monitor output ==="
        cat /tmp/pip_fix_output.log || echo "No fix output"
        
        # Stop monitor
        kill $FIX_PID 2>/dev/null || true
        echo "Monitor killed"
        
        echo "=== Verify APK ==="
        ls -la bin/*.apk 2>/dev/null || echo "No APK found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: scriptgenerator-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7