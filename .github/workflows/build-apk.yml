name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-dev python3-setuptools python3-venv
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config
        sudo apt install -y zlib1g-dev libncursesw5-dev cmake
        sudo apt install -y libffi-dev libssl-dev
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Setup Android SDK
      run: |
        SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
        
        # 创建目录
        mkdir -p $SDK_DIR/tools/bin
        mkdir -p $SDK_DIR/cmdline-tools/latest
        
        # 下载并解压 cmdline-tools
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        
        # 移动到 cmdline-tools/latest
        cp -r /tmp/cmdline-tools/* $SDK_DIR/cmdline-tools/latest/
        
        # 关键：创建 tools/bin 目录结构（buildozer 期望这个路径）
        # 将 sdkmanager 复制到 tools/bin
        if [ -f $SDK_DIR/cmdline-tools/latest/bin/sdkmanager ]; then
          cp $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/
        fi
        
        # 创建 platforms 和 build-tools 目录（即使为空也没关系，buildozer 会自己安装）
        mkdir -p $SDK_DIR/platforms
        mkdir -p $SDK_DIR/build-tools
        
        # 设置环境变量
        echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
        echo "PATH=$SDK_DIR/cmdline-tools/latest/bin:$SDK_DIR/tools/bin:$SDK_DIR/platform-tools:$PATH" >> $GITHUB_ENV
        
        # 接受许可证
        yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        
        # 预安装 build-tools（避免 buildozer 自己下载时的许可证问题）
        $SDK_DIR/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        
        # 复制到 tools/bin（再次确保）
        if [ -f $SDK_DIR/cmdline-tools/latest/bin/sdkmanager ]; then
          cp $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/
          ls -la $SDK_DIR/tools/bin/
        fi
        
        echo "=== SDK Structure ==="
        find $SDK_DIR -maxdepth 3 -type d | head -20
    
    - name: Build APK
      run: |
        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 90
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7