name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build APK using Docker
      run: |
        # 先修复 buildozer 的 root 检查
        docker run --rm \
          -v ${{ github.workspace }}:/home/user/script-generator \
          -w /home/user/script-generator \
          kivy/buildozer:latest \
          bash -c '
            # 禁用 buildozer 的 root 检查
            sed -i "s/warn_on_root = 1/warn_on_root = 0/" ~/.venv/lib/python*/site-packages/buildozer/__init__.py 2>/dev/null || true
            # 找到并修复 check_root 函数
            python3 -c "
import buildozer
import os
# Patch buildozer to skip root check
bp = buildozer.__file__
with open(bp, 'r') as f:
    content = f.read()
if 'check_root' in content:
    content = content.replace(
                'self.check_root()',
                '# check_root disabled'
            )
    with open(bp, 'w') as f:
        f.write(content)
    print('Patched buildozer root check')
else:
    print('No root check found')
"
            echo "=== Python 版本 ==="
            python3 --version
            echo ""
            echo "=== 构建 APK ==="
            BUILDOZER_ALLOW_ROOT=1 buildozer android debug 2>&1 | tee buildozer.log
          '
      timeout-minutes: 180
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7