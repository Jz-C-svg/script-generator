name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip python3-dev python3-setuptools python3-venv
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config
        sudo apt-get install -y zlib1g-dev libncurses5-dev libncursesw5-dev
        sudo apt-get install -y libffi-dev libssl-dev cmake
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Build APK with auto-accept licenses
      run: |
        # 设置环境变量
        export BUILDOZER_WARN_ON_ROOT=1
        export ACCEPT_EULA=Y
        export ANDROID_SDK_LICENSES="d56f5187d910ad2b9f6b1af9b9eec6b48ab8c278"
        
        # 预先创建许可证目录并写入许可证
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        
        # 也创建临时目录的许可证
        mkdir -p /tmp/android-sdk/licenses
        echo -e "\n" > /tmp/android-sdk/licenses/android-sdk-license
        
        # 清除旧配置
        rm -rf ~/.buildozer/android/platform/android-sdk 2>/dev/null || true
        rm -rf ~/.buildozer/android/platform/android-ndk 2>/dev/null || true
        
        # 运行 buildozer
        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 120
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7