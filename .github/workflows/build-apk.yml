name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies + Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        sudo apt-get install -y zlib1g-dev libncurses-dev cmake wget unzip
        sudo apt-get install -y libffi-dev libssl-dev git autoconf automake libtool pkg-config
        BUILDOZER_SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $BUILDOZER_SDK/cmdlinetools
        if [ ! -f $BUILDOZER_SDK/cmdlinetools/latest/bin/sdkmanager ]; then
          echo "Downloading Android SDK commandlinetools..."
          cd $BUILDOZER_SDK/cmdlinetools
          curl -L -o cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline.zip
          if [ -d cmdline-tools ]; then
            mv cmdline-tools latest
          elif [ -d tools ]; then
            mv tools latest
          fi
          rm -f cmdline.zip
        fi
        if [ -d $BUILDOZER_SDK/cmdlinetools/latest/bin ] && [ ! -d $BUILDOZER_SDK/tools ]; then
          mkdir -p $BUILDOZER_SDK/tools/bin
          ln -s $BUILDOZER_SDK/cmdlinetools/latest/bin/* $BUILDOZER_SDK/tools/bin/
        fi
        mkdir -p $BUILDOZER_SDK/licenses
        printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb52fb78af6dfcb131a6481e\ne6b7c2ab7fa2298c15165e9583d0acf0b04a2232\n" > $BUILDOZER_SDK/licenses/android-sdk-license
        printf "\n84831b9409646a918e30573bab4c9c91346d8abd\n" > $BUILDOZER_SDK/licenses/android-sdk-preview-license
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$BUILDOZER_SDK/cmdlinetools/latest/bin:$PATH
        yes | sdkmanager --sdk_root=$BUILDOZER_SDK "platforms;android-33" "build-tools;33.0.2" "platform-tools" 2>&1 | tail -5 || true
        echo "SDK ready"
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

    - name: Install Python packages
      run: |
        python3 --version
        pip3 install --upgrade pip wheel
        pip3 install "cython<3"
        pip3 install buildozer==1.5.0
        pip3 install kivy==2.2.1 kivymd==1.0.2 httpx beautifulsoup4
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        PATH: /usr/lib/jvm/java-17-openjdk-amd64/bin:/opt/hostedtoolcache/Python/3.10.20/x64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    - name: Bootstrap buildozer (download p4a)
      run: |
        export ANDROIDAPI=33
        export ANDROIDMINAPI=21
        export ANDROIDNDK=28c
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$ANDROID_HOME/cmdlinetools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        export BUILDOZER_ALLOW_ROOT=1
        cd "$GITHUB_WORKSPACE"
        rm -rf .buildozer || true
        # Run buildozer once to let it download its bundled python-for-android
        # It will fail, but that's ok - we just need the p4a source
        echo "=== Bootstrapping buildozer to download p4a (expect failure) ==="
        timeout 120 buildozer android debug 2>&1 | tail -5 || true
        echo "Bootstrap done"

    - name: Patch buildozer's built-in p4a (fix pip resolvelib bug)
      run: |
        BUILDOZER_P4A=$HOME/.buildozer/android/platform/python-for-android/pythonforandroid
        if [ -d "$BUILDOZER_P4A" ]; then
          echo "Found buildozer's p4a at $BUILDOZER_P4A"
        else
          echo "ERROR: buildozer p4a not found at $BUILDOZER_P4A"
          ls $HOME/.buildozer/android/platform/ 2>/dev/null || echo "No platform dir"
          exit 1
        fi

        # === Patch 1: hostpython3 __init__.py - add pip upgrade after ensurepip ===
        INIT_PY=$BUILDOZER_P4A/recipes/hostpython3/__init__.py
        echo "Patching $INIT_PY..."
        # Insert pip upgrade after the ensurepip line
        sed -i '/^        ensurepip$/a\            sh(pip_cmd, "-m", "pip", "install", "--upgrade", "--no-deps", "--trusted-host=pypi.org", "--trusted-host=files.pythonhosted.org", "pip")' "$INIT_PY"
        if grep -q 'trusted-host.*pypi.org' "$INIT_PY"; then
          echo "hostpython3 patch VERIFIED"
        else
          echo "WARNING: hostpython3 patch may not have applied"
        fi

        # === Patch 2: build.py - upgrade pip using python -m pip --no-deps ===
        BUILD_PY=$BUILDOZER_P4A/build.py
        echo "Patching $BUILD_PY..."
        # Replace pip install -U pip with python -m pip install --upgrade --no-deps
        sed -i 's|"source venv/bin/activate && pip install -U pip"|"source venv/bin/activate \&\& python -m pip install --upgrade --no-deps --trusted-host=pypi.org --trusted-host=files.pythonhosted.org pip"|' "$BUILD_PY"
        # Also handle any commented version
        sed -i 's|# "source venv/bin/activate && pip install -U pip"  # COMMENTED OUT|"source venv/bin/activate \&\& python -m pip install --upgrade --no-deps --trusted-host=pypi.org --trusted-host=files.pythonhosted.org pip"|' "$BUILD_PY"
        echo "Checking build.py pip line:"
        grep "source venv/bin/activate" "$BUILD_PY" || true
        echo "P4A patches applied to buildozer's built-in p4a"

    - name: Build APK (with patched p4a)
      timeout-minutes: 120
      run: |
        export ANDROIDAPI=33
        export ANDROIDMINAPI=21
        export ANDROIDNDK=28c
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$ANDROID_HOME/cmdlinetools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        export BUILDOZER_ALLOW_ROOT=1
        cd "$GITHUB_WORKSPACE"
        # Keep .buildozer but rebuild the APK parts
        rm -rf .buildozer/android/platform/build-* || true
        rm -rf .buildozer/android/app || true
        # Run buildozer (p4a is already patched in place)
        buildozer android debug 2>&1 | tee buildozer.log
        EXIT_CODE=${PIPESTATUS[0]}
        echo "=== Build exit code: $EXIT_CODE ==="
        tail -n 50 buildozer.log
        ls bin/*.apk 2>/dev/null && echo "APK found!" || (echo "APK NOT found"; exit 1)

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: scriptgenerator-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7
