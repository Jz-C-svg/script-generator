name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies + Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        sudo apt-get install -y zlib1g-dev libncurses-dev cmake wget unzip
        sudo apt-get install -y libffi-dev libssl-dev git autoconf automake libtool pkg-config
        # IMPORTANT: android.sdk config token is deprecated and ignored in buildozer.
        # Buildozer always uses ~/.buildozer/android/platform/android-sdk/ for its SDK.
        # We must download cmdlinetools to THIS path, not anywhere else.
        BUILDOZER_SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $BUILDOZER_SDK/cmdlinetools
        if [ ! -f $BUILDOZER_SDK/cmdlinetools/latest/bin/sdkmanager ]; then
          echo "Downloading Android SDK commandlinetools to buildozer SDK path..."
          cd $BUILDOZER_SDK/cmdlinetools
          curl -L -o cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          echo "Downloaded, size: $(wc -c < cmdline.zip) bytes"
          unzip -q cmdline.zip
          # New cmdlinetools zip creates cmdline-tools/ directory at the root
          if [ -d cmdline-tools ]; then
            mv cmdline-tools latest
          elif [ -d tools ]; then
            # Old zip creates tools/ directory
            mv tools latest
          fi
          rm -f cmdline.zip
          echo "SDK tools installed at $BUILDOZER_SDK"
          ls -la $BUILDOZER_SDK/cmdlinetools/latest/bin/
        fi
        # Create compatibility symlinks: p4a looks for sdkmanager at tools/bin/sdkmanager
        # but cmdlinetools-v3 has it at cmdlinetools/latest/bin/sdkmanager
        if [ -d $BUILDOZER_SDK/cmdlinetools/latest/bin ] && [ ! -d $BUILDOZER_SDK/tools ]; then
          mkdir -p $BUILDOZER_SDK/tools/bin
          ln -s $BUILDOZER_SDK/cmdlinetools/latest/bin/* $BUILDOZER_SDK/tools/bin/
          echo "Symlinks created: tools/bin/ -> cmdlinetools/latest/bin/"
          ls -la $BUILDOZER_SDK/tools/bin/
        fi
        # Accept all SDK licenses by writing license files directly to buildozer's SDK path
        mkdir -p $BUILDOZER_SDK/licenses
        printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb52fb78af6dfcb131a6481e\ne6b7c2ab7fa2298c15165e9583d0acf0b04a2232\n" > $BUILDOZER_SDK/licenses/android-sdk-license
        printf "\n84831b9409646a918e30573bab4c9c91346d8abd\n" > $BUILDOZER_SDK/licenses/android-sdk-preview-license
        echo "License files written to $BUILDOZER_SDK/licenses/"
        ls -la $BUILDOZER_SDK/licenses/
        # Pre-install required SDK components using sdkmanager so buildozer/p4a
        # doesn't need to install them itself (which is slow and may timeout)
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$BUILDOZER_SDK/cmdlinetools/latest/bin:$PATH
        echo "Pre-installing SDK components with sdkmanager..."
        yes | sdkmanager --sdk_root=$BUILDOZER_SDK "platforms;android-33" "build-tools;33.0.2" "platform-tools" 2>&1 | tail -5 || true
        echo "SDK components pre-installed"
        ls -la $BUILDOZER_SDK/platforms/ 2>/dev/null || echo "No platforms installed yet"
        ls -la $BUILDOZER_SDK/build-tools/ 2>/dev/null || echo "No build-tools installed yet"
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

    - name: Download and patch python-for-android (fix pip version)
      run: |
        # Root cause: p4a's hostpython3 recipe installs pip 21.3.1 via ensurepip.
        # pip 21.3.1 + newer resolvelib = ImportError: RequirementInformation.
        # Fix: insert pip upgrade after ensurepip in hostpython3.build_arch.
        P4A_DIR=$HOME/p4a-recipes
        rm -rf $P4A_DIR
        mkdir -p $P4A_DIR
        echo "Downloading python-for-android..."
        curl -fsSL https://github.com/kivy/python-for-android/archive/refs/heads/master.zip -o $HOME/p4a.zip
        echo "Downloaded: $(wc -c < $HOME/p4a.zip) bytes"
        unzip -q $HOME/p4a.zip -d $HOME
        mv $HOME/python-for-android-master/* $P4A_DIR/
        rm -rf $HOME/python-for-android-master $HOME/p4a.zip
        echo "Extracted p4a to $P4A_DIR"
        HOSTPY3=$P4A_DIR/pythonforandroid/recipes/hostpython3/__init__.py
        # Verify the recipe exists and show ensurepip context
        grep -n 'ensurepip\|fix_pip_shebangs' $HOSTPY3
        # Write pip patch text to file using printf (avoids heredoc YAML issues)
        printf '%s\n' \
            "# Upgrade pip to 24.0" \
            "        shprint(" \
            "            sh.Command(self.python_exe)," \
            "            '-m', 'pip', 'install', '--upgrade', 'pip==24.0'," \
            "            _env={'HOME': '/tmp', 'PATH': self.local_bin}," \
            "        )" > /tmp/pip_patch.py
        # Write Python patcher to file using printf
        printf '%s\n' \
            "import sys" \
            "hostpy3 = sys.argv[1]" \
            "patch_text = open('/tmp/pip_patch.py').read()" \
            "lines = open(hostpy3).readlines()" \
            "if any('pip==24.0' in l for l in lines):" \
            "    print('pip==24.0 already present')" \
            "else:" \
            "    for i, line in enumerate(lines):" \
            "        if 'self.fix_pip_shebangs()' in line:" \
            "            lines.insert(i+1, patch_text)" \
            "            break" \
            "    else:" \
            "        print('ERROR: fix_pip_shebangs not found')" \
            "        sys.exit(1)" \
            "    open(hostpy3, 'w').writelines(lines)" \
            "    print('pip upgrade injected OK')" > /tmp/patch_hostpy3.py
        python3 /tmp/patch_hostpy3.py "$HOSTPY3"
        echo "---Verifying patch---"
        grep -n 'pip==24.0' $HOSTPY3 && echo "PATCH OK" || echo "PATCH FAILED"
        echo "P4A patch complete"
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Install Python packages
      run: |
        python3 --version
        pip3 install --upgrade pip wheel
        pip3 install "cython<3"
        pip3 install buildozer==1.5.0
        pip3 install kivy==2.2.1 kivymd==1.0.2 httpx beautifulsoup4
        pip3 --version
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        PATH: /usr/lib/jvm/java-17-openjdk-amd64/bin:/opt/hostedtoolcache/Python/3.10.20/x64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    - name: Build APK
      timeout-minutes: 120
      run: |
        export ANDROIDAPI=33
        export ANDROIDMINAPI=21
        export ANDROIDNDK=28c
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$ANDROID_HOME/cmdlinetools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        export BUILDOZER_ALLOW_ROOT=1
        export BUILDOZER_WARN_ON_ROOT=0
        cd "$GITHUB_WORKSPACE"
        echo "=== Verifying p4a.source_dir in buildozer.spec ==="
        grep 'p4a.source_dir' buildozer.spec && echo "Using patched p4a from $HOME/p4a-recipes"
        echo "=== Verifying pip==24.0 in hostpython3 recipe ==="
        grep -n 'pip==24.0' $HOME/p4a-recipes/pythonforandroid/recipes/hostpython3/__init__.py || echo "PATCH MISSING"
        echo "=== Pre-installed SDK ==="
        ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
        echo "=== Starting buildozer (using patched p4a from p4a.source_dir) ==="
        buildozer android debug 2>&1 | tee buildozer.log
        EXIT_CODE=${PIPESTATUS[0]}
        echo "=== Build exit code: $EXIT_CODE ==="
        tail -n 50 buildozer.log
        echo "=== Checking for APK ==="
        ls -la bin/ 2>/dev/null || echo "bin dir not found"
        if ls bin/*.apk 2>/dev/null; then
          echo "APK found!"
        else
          echo "APK NOT found - build failed"
          exit 1
        fi

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: scriptgenerator-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7
