name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        sudo apt-get install -y zlib1g-dev libncurses-dev cmake
        sudo apt-get install -y libffi-dev libssl-dev git autoconf libtool pkg-config
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        python3 --version
        pip3 install --upgrade pip setuptools wheel
        pip3 install cython==0.29.36
        pip3 install buildozer
        pip3 install kivy==2.1.0 kivymd==1.1.1 httpx beautifulsoup4 jinja2
        pip3 install --upgrade "pip<24.0"
        echo "=== VERSIONS ==="
        python3 --version
        pip3 --version
        cython --version
        buildozer --version
    
    - name: Build APK
      timeout-minutes: 120
      run: |
        set -e
        cd $GITHUB_WORKSPACE
        export ANDROIDAPI=33
        export ANDROIDMINAPI=21
        
        # 关键修复：在 p4a 的 venv 中也降级 pip
        export P4A_PIP=pip
        export P4A_NO_TERMS=1
        
        yes | buildozer -v android debug 2>&1 | tee buildozer.log
        echo "=== Verify APK ==="
        ls -la bin/*.apk 2>/dev/null || echo "NO APK FOUND"
      env:
        BUILDOZER_ALLOW_ROOT: 1
        BUILDOZER_WARN_ON_ROOT: 0
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: scriptgenerator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7