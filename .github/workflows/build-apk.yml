name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        sudo apt-get install -y zlib1g-dev libncurses-dev cmake
        sudo apt-get install -y libffi-dev libssl-dev git autoconf automake libtool pkg-config
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Install Python packages
      run: |
        python3 --version
        pip3 install --upgrade pip==21.3.1 setuptools==65.5.0 wheel
        pip3 install "cython<3"
        pip3 install buildozer==1.5.0
        pip3 install kivy==2.2.1 kivymd==1.1.1 httpx beautifulsoup4
        pip3 --version
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        PATH: /usr/lib/jvm/java-17-openjdk-amd64/bin:/opt/hostedtoolcache/Python/3.10.20/x64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    - name: Build APK
      timeout-minutes: 180
      run: |
        export ANDROIDAPI=27
        export ANDROIDMINAPI=21
        export ANDROIDNDK=25
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        export BUILDOZER_ALLOW_ROOT=1
        export BUILDOZER_WARN_ON_ROOT=0
        cd "$GITHUB_WORKSPACE"
        buildozer -v android debug 2>&1 | tee buildozer.log
        echo "=== Checking for APK ==="
        ls -la bin/ 2>/dev/null || echo "bin dir not found"
        if ls bin/*.apk 2>/dev/null; then
          echo "APK found!"
        else
          echo "APK NOT found - build may have failed"
          tail -n 20 buildozer.log
          exit 1
        fi

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: scriptgenerator-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7
