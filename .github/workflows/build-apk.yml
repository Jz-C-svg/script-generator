name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: kivy/buildozer:latest
      options: --user root
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Show environment
      run: |
        echo "=== Python ==="
        python3 --version || python --version
        echo ""
        echo "=== pip ==="
        pip3 --version || pip --version
        echo ""
        echo "=== buildozer ==="
        buildozer --version
        echo ""
        echo "=== Java ==="
        java -version 2>&1 | head -1
        echo ""
        echo "=== Environment ==="
        echo "HOME: $HOME"
        echo "ANDROIDSDK: $ANDROIDSDK"
        echo "ANDROIDNDK: $ANDROIDNDK"
    
    - name: Build APK
      timeout-minutes: 120
      run: |
        set -e
        cd $GITHUB_WORKSPACE
        echo "=== Starting build ==="
        yes | buildozer -v android debug 2>&1 | tee buildozer.log
        echo "=== Verify APK ==="
        ls -la bin/*.apk
      env:
        ANDROIDAPI: "33"
        ANDROIDMINAPI: "21"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7