name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: ubuntu:22.04
      options: --privileged
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install all dependencies
      run: |
        bash -c '
        set -e
        
        # 更新并安装所有依赖
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          python3 python3-pip python3-dev python3-setuptools python3-venv \
          git zip unzip openjdk-17-jdk libtool pkg-config \
          zlib1g-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev \
          libtool-bin autoconf automake \
          gcc g++ make cython3 \
          wget curl bash
        
        echo "=== 环境信息 ==="
        python3 --version
        java -version 2>&1 | head -1
        autoconf --version | head -1
        
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        '
    
    - name: Install Python packages
      run: |
        bash -c '
        pip3 install --upgrade pip
        pip3 install buildozer
        pip3 install kivymd httpx jinja2
        '
    
    - name: Cache Buildozer downloads
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-ub22-v2-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-ub22-v2-
    
    - name: Build APK
      run: |
        bash -c '
        set -e
        
        echo "=== 最终环境 ==="
        python3 --version
        which python3
        which buildozer
        autoconf --version | head -1
        
        echo ""
        echo "=== 开始构建 ==="
        yes | buildozer android debug 2>&1 | tee buildozer.log
        BUILD_RESULT=${PIPESTATUS[0]}
        echo "=== Build exit code: $BUILD_RESULT ==="
        if [ $BUILD_RESULT -ne 0 ]; then
          echo "Build failed"
          tail -100 buildozer.log
          exit 1
        fi
        if [ ! -f bin/*.apk ]; then
          echo "No APK generated"
          ls -la bin/ 2>/dev/null || echo "bin/ missing"
          exit 1
        fi
        echo "APK generated:"
        ls -la bin/*.apk
        '
      timeout-minutes: 180
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7