name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: ubuntu:22.04
      options: --privileged
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install all dependencies
      run: |
        bash -c '
        set -e
        
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          software-properties-common
        
        # 安装 Python 3.11 (lxml 需要)
        add-apt-repository -y ppa:deadsnakes/ppa
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          python3.11 python3.11-dev python3.11-venv python3.11-distutils \
          git zip unzip openjdk-17-jdk libtool pkg-config \
          zlib1g-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev \
          libtool-bin autoconf automake \
          gcc g++ make cython3 \
          wget curl bash
        
        # 创建链接使用 Python 3.11
        ln -sf /usr/bin/python3.11 /usr/bin/python3
        ln -sf /usr/bin/python3.11 /usr/bin/python
        ln -sf /usr/bin/cython3 /usr/bin/cython
        ln -sf /usr/bin/python3.11-venv /usr/bin/venv 2>/dev/null || true
        
        # 安装 pip for Python 3.11
        curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11
        
        echo "=== 环境信息 ==="
        python3 --version
        java -version 2>&1 | head -1
        autoconf --version | head -1
        cython --version
        
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        '
    
    - name: Install Python packages
      run: |
        bash -c '
        set -e
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer
        python3 -m pip install kivymd httpx jinja2 beautifulsoup4
        '
    
    - name: Cache Buildozer downloads
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-ub22-py311-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-ub22-py311-
    
    - name: Build APK
      run: |
        bash -c '
        set -e
        
        echo "=== 最终环境 ==="
        python3 --version
        which cython
        which buildozer
        
        echo ""
        echo "=== 开始构建 ==="
        yes | buildozer android debug 2>&1 | tee buildozer.log
        '
      timeout-minutes: 180
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7