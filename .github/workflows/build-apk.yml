name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-dev python3-setuptools python3-venv
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config
        sudo apt install -y zlib1g-dev libncursesw5-dev cmake
        sudo apt install -y libffi-dev libssl-dev
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Setup Android SDK
      run: |
        # 创建 buildozer 期望的 SDK 目录
        SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_DIR
        
        # 下载 cmdline-tools
        cd $SDK_DIR
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        rm cmdline-tools.zip
        
        # 创建正确的目录结构
        mkdir -p cmdline-tools
        cd cmdline-tools
        mkdir -p latest
        
        # 移动文件到正确位置
        cd ..
        for item in bin lib NOTICE.txt source.properties; do
          if [ -e "$item" ]; then mv $item cmdline-tools/latest/ 2>/dev/null; fi
        done
        
        # 设置环境变量
        echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
        echo "PATH=$SDK_DIR/cmdline-tools/latest/bin:$SDK_DIR/platform-tools:$PATH" >> $GITHUB_ENV
        
        # 接受许可证
        yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        
        # 安装必要的组件
        $SDK_DIR/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        
        # 验证安装
        ls -la $SDK_DIR/build-tools/
    
    - name: Build APK
      run: |
        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 90
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7