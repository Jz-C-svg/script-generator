name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies + Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        sudo apt-get install -y zlib1g-dev libncurses-dev cmake wget unzip
        sudo apt-get install -y libffi-dev libssl-dev git autoconf automake libtool pkg-config
        # Download Android SDK commandlinetools (newer version with correct cmdline-tools structure)
        SDK_DIR=$HOME/android-sdk
        mkdir -p $SDK_DIR/cmdlinetools
        if [ ! -f $SDK_DIR/cmdlinetools/latest/bin/sdkmanager ]; then
          echo "Downloading Android SDK commandlinetools..."
          cd $SDK_DIR/cmdlinetools
          curl -L -o cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          echo "Downloaded, size: $(wc -c < cmdline.zip) bytes"
          unzip -q cmdline.zip
          # New cmdlinetools zip creates cmdline-tools/ directory
          if [ -d cmdline-tools ]; then
            mv cmdline-tools latest
          elif [ -d tools ]; then
            # Old zip creates tools/ directory; rename to latest for consistency
            mv tools latest
          fi
          rm -f cmdline.zip
          echo "SDK tools installed at $SDK_DIR"
          ls -la $SDK_DIR/cmdlinetools/latest/bin/
        fi
        # Accept all SDK licenses (required for build-tools, platforms, etc.)
        # Write license files directly to BOTH possible SDK locations:
        # 1. $SDK_DIR (where we download the SDK)
        # 2. ~/.buildozer/android/platform/android-sdk/ (where buildozer actually uses it)
        mkdir -p $SDK_DIR/licenses ~/.buildozer/android/platform/android-sdk/licenses
        printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb52fb78af6dfcb131a6481e\ne6b7c2ab7fa2298c15165e9583d0acf0b04a2232\n" > $SDK_DIR/licenses/android-sdk-license
        cp $SDK_DIR/licenses/android-sdk-license ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        printf "\n84831b9409646a918e30573bab4c9c91346d8abd\n" > $SDK_DIR/licenses/android-sdk-preview-license
        cp $SDK_DIR/licenses/android-sdk-preview-license ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo "License files written to both SDK locations"
        ls -la $SDK_DIR/licenses/
        ls -la ~/.buildozer/android/platform/android-sdk/licenses/
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        ANDROID_HOME: /home/runner/android-sdk

    - name: Install Python packages
      run: |
        python3 --version
        pip3 install --upgrade pip==21.3.1 setuptools==65.5.0 wheel
        pip3 install "cython<3"
        pip3 install buildozer==1.5.0
        pip3 install kivy==2.2.1 kivymd==1.1.1 httpx beautifulsoup4
        pip3 --version
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        ANDROID_HOME: /home/runner/android-sdk
        PATH: /usr/lib/jvm/java-17-openjdk-amd64/bin:/opt/hostedtoolcache/Python/3.10.20/x64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    - name: Build APK
      timeout-minutes: 180
      run: |
        export ANDROIDAPI=27
        export ANDROIDMINAPI=21
        export ANDROIDNDK=25
        export ANDROID_HOME=$HOME/android-sdk
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$ANDROID_HOME/cmdlinetools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        export BUILDOZER_ALLOW_ROOT=1
        export BUILDOZER_WARN_ON_ROOT=0
        cd "$GITHUB_WORKSPACE"
        buildozer android debug 2>&1 | tee buildozer.log
        echo "=== Checking for APK ==="
        ls -la bin/ 2>/dev/null || echo "bin dir not found"
        if ls bin/*.apk 2>/dev/null; then
          echo "APK found!"
        else
          echo "APK NOT found - build may have failed"
          tail -n 20 buildozer.log
          exit 1
        fi

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: scriptgenerator-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7
