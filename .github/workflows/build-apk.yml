name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-dev python3-setuptools python3-venv
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config
        sudo apt install -y zlib1g-dev libncursesw5-dev cmake
        sudo apt install -y libffi-dev libssl-dev
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Check pre-installed Android SDK
      run: |
        echo "=== 检查预装 SDK ==="
        if [ -d "/usr/local/lib/android/sdk" ]; then
          echo "找到 GitHub Actions 预装 SDK"
          ls -la /usr/local/lib/android/sdk/
          echo ""
          echo "SDK platforms:"
          ls -la /usr/local/lib/android/sdk/platforms/ 2>/dev/null || echo "  (无)"
          echo ""
          echo "Build tools:"
          ls -la /usr/local/lib/android/sdk/build-tools/ 2>/dev/null || echo "  (无)"
          echo ""
          echo "NDK:"
          ls -la /usr/local/lib/android/sdk/ndk/ 2>/dev/null || echo "  (无)"
        fi
    
    - name: Setup Android SDK
      run: |
        # 使用 GitHub Actions 预装的 SDK
        if [ -d "/usr/local/lib/android/sdk" ]; then
          SDK_DIR="/usr/local/lib/android/sdk"
        else
          SDK_DIR="$HOME/android-sdk"
          mkdir -p $SDK_DIR
        fi
        
        # 创建 buildozer 期望的符号链接
        mkdir -p $HOME/.buildozer/android/platform
        ln -sf $SDK_DIR $HOME/.buildozer/android/platform/android-sdk 2>/dev/null || cp -r $SDK_DIR $HOME/.buildozer/android/platform/android-sdk
        
        # 设置环境变量
        echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
        echo "PATH=$SDK_DIR/cmdline-tools/latest/bin:$SDK_DIR/platform-tools:$SDK_DIR/build-tools/33.0.0:$PATH" >> $GITHUB_ENV
        
        # 接受许可证
        if [ -f $SDK_DIR/cmdline-tools/latest/bin/sdkmanager ]; then
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        fi
        
        echo "=== SDK 配置完成 ==="
        echo "ANDROID_HOME=$SDK_DIR"
    
    - name: Build APK
      run: |
        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 90
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7