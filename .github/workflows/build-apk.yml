name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-dev python3-setuptools python3-venv
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config
        sudo apt install -y zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake
        sudo apt install -y libffi-dev libssl-dev
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Build APK (let buildozer handle SDK)
      run: |
        # 设置 buildozer 的环境变量，让它自动处理 SDK
        export BUILDOZER_WARN_ON_ROOT=1
        export ACCEPT_EULA=Y
        
        # 清除可能存在的 SDK 配置
        rm -rf ~/.buildozer/android/platform/android-sdk 2>/dev/null || true
        rm -rf ~/.buildozer/android/platform/android-ndk 2>/dev/null || true
        
        # 直接运行 buildozer，让它自己下载和配置所有依赖
        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 120
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7