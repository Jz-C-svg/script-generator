name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: ubuntu:22.04
      options: --privileged
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install system dependencies (Ubuntu 22.04)
      run: |
        apt-get update
        apt-get install -y \
          python3-pip python3-dev python3-setuptools python3-venv \
          git zip unzip openjdk-17-jdk libtool pkg-config \
          zlib1g-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev \
          libtool-bin autoconf automake \
          gcc g++ make
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Cache Buildozer downloads
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-docker-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-docker-
    
    - name: Build APK
      run: |
        set -e
        set -o pipefail
        
        echo "=== autoconf 版本 ==="
        autoconf --version | head -1
        
        echo ""
        echo "=== 开始构建 ==="
        yes | buildozer android debug 2>&1 | tee buildozer.log
        BUILD_RESULT=$PIPESTATUS[0]
        echo "=== Build exit code: $BUILD_RESULT ==="
        if [ $BUILD_RESULT -ne 0 ]; then
          echo "Build failed with exit code $BUILD_RESULT"
          exit 1
        fi
        if [ ! -f bin/*.apk ]; then
          echo "Error: No APK file generated"
          ls -la bin/ 2>/dev/null || echo "bin/ does not exist"
          exit 1
        fi
        echo "APK successfully generated:"
        ls -la bin/*.apk
      timeout-minutes: 180
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: script-generator-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7